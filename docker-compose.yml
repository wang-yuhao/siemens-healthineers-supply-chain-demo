version: '3.8'

services:
  # Main Interactive Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: siemens-supply-chain-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command: streamlit run app/dashboard.py
    networks:
      - supply-chain-network
    depends_on:
      - database
      - mlflow

  # MLflow Tracking Server
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: siemens-mlflow-server
    ports:
      - "5000:5000"
    command: mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root /artifacts --host 0.0.0.0
    networks:
      - supply-chain-network

  # Database Service (SQLite for demo)
  database:
    image: alpine:latest
    container_name: siemens-supply-chain-db
    volumes:
      - ./data:/data
    networks:
      - supply-chain-network
    command: tail -f /dev/null

  # Automated IoT Data Simulator (Mocking Kafka Pipeline for demo)
  simulator:
    build: .
    container_name: siemens-iot-simulator
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    command: python app/kafka_producer.py
    networks:
      - supply-chain-network
    depends_on:
      - database

  grafana:
    image: grafana/grafana:latest
    container_name: siemens-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - supply-chain-network
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    container_name: siemens-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-storage:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - supply-chain-network

volumes:
  grafana-storage:
  prometheus-storage:

networks:
  supply-chain-network:
    driver: bridge
